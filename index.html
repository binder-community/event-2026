<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서모임이 이야기하는 독서모임 — 운영 대시보드</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20width='32'%20height='32'%20rx='7'%20fill='%238fc9bc'/%3E%3Cpath%20d='M6%209C9%208%2013%208%2016%2010C19%208%2023%208%2026%209L26%2022C23%2021%2019%2021%2016%2023C13%2021%209%2021%206%2022Z'%20fill='%231c1a17'/%3E%3Cline%20x1='16'%20y1='10.5'%20x2='16'%20y2='22.5'%20stroke='%238fc9bc'%20stroke-width='1.4'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  :root{
    /* 바인더 팔레트: Black + Mint on off-white. 민트는 임팩트 포인트에만. */
    --bg:#fafaf7; --surface:#ffffff; --ink:#1c1a17; --body:#3a3733; --sub:#6f6a63;
    --mint:#8fc9bc; --mint-ink:#2f8f78; --mint-bg:#eaf4f1;
    --ok:#2e6b3e; --ok-bg:#eef4ef;
    --pend:#8a6b1f; --pend-bg:#f7f2e4;
    --loss:#b3402a; --loss-bg:#f7ece9;
    --line:#e9e9e4; --line-strong:#d8d6cf;
    --sidebar-w:228px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:16px}
  body{
    background:var(--bg);color:var(--body);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo',sans-serif;
    font-size:15.5px;line-height:1.7;letter-spacing:-0.01em;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit}

  /* ===== 레이아웃 ===== */
  #layout{display:flex;min-height:100vh}
  #sidebar{
    width:var(--sidebar-w);flex:0 0 var(--sidebar-w);
    background:var(--surface);border-right:1px solid var(--line);
    position:sticky;top:0;height:100vh;overflow-y:auto;
    display:flex;flex-direction:column;padding:20px 0 16px;
  }
  #content{flex:1;min-width:0;padding:40px 40px 140px}
  .content-inner{max-width:720px}

  /* ===== 사이드바 ===== */
  .sb-head{padding:0 20px 18px;border-bottom:1px solid var(--line)}
  .sb-head .ttl{font-size:15px;font-weight:700;color:var(--ink);line-height:1.45}
  .sb-head .meta{font-size:13px;color:var(--sub);margin-top:6px}
  .sb-head .dday{font-weight:700;color:var(--mint-ink)}
  nav{padding:8px 10px;flex:1}
  .nav-group-title{
    font-size:11.5px;font-weight:700;letter-spacing:0.04em;color:var(--sub);
    padding:14px 12px 5px;text-transform:none;
  }
  .nav-item{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    width:100%;text-align:left;border:none;background:none;cursor:pointer;
    padding:8px 12px 8px 18px;border-radius:7px;font-size:14.5px;color:var(--body);
  }
  .nav-item:hover{background:#f3f1ef}
  .nav-item.active{background:var(--mint-bg);color:var(--ink);font-weight:700;box-shadow:inset 2px 0 0 var(--mint)}
  .nav-badge{font-size:12px;font-weight:600;color:var(--pend);background:var(--pend-bg);border-radius:10px;padding:0 7px}
  .sb-foot{padding:12px 20px 0;border-top:1px solid var(--line);font-size:12.5px;color:var(--sub)}
  .conn{display:flex;align-items:center;gap:6px}
  .conn .dot{width:8px;height:8px;border-radius:50%;background:var(--pend)}
  .conn.on .dot{background:var(--ok)}

  /* ===== 모바일 상단바 + 탭 ===== */
  #topbar{display:none}
  @media (max-width:768px){
    #layout{display:block}
    #sidebar{display:none}
    #topbar{
      display:block;position:sticky;top:0;z-index:40;
      background:var(--surface);border-bottom:1px solid var(--line);
    }
    .tb-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px}
    .tb-row .ttl{font-size:15px;font-weight:700;color:var(--ink)}
    .tb-row .conn{font-size:12px}
    #tabs{display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none}
    #tabs::-webkit-scrollbar{display:none}
    .tab{
      flex:0 0 auto;border:none;background:none;cursor:pointer;
      padding:9px 12px 11px;font-size:14.5px;color:var(--sub);
      border-bottom:2px solid transparent;white-space:nowrap;
    }
    .tab.active{color:var(--ink);font-weight:700;border-bottom-color:var(--mint)}
    #content{padding:24px 16px 140px}
  }

  /* ===== 본문 공통 ===== */
  h1{font-size:23px;font-weight:800;color:var(--ink);letter-spacing:-0.02em;line-height:1.4}
  .page-desc{font-size:14px;color:var(--sub);margin-top:6px;margin-bottom:26px}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-bottom:18px;overflow-x:auto}
  .panel-title{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:12px}
  .venue-info{display:flex;flex-direction:column;gap:12px}
  .venue-line{display:flex;gap:14px;align-items:baseline;font-size:16px}
  .venue-line .k{flex:0 0 40px;font-weight:700;color:var(--ink)}
  .venue-line .v{flex:1;min-width:0;color:var(--ink);font-weight:500;word-break:keep-all}
  .maplink{color:var(--mint-ink);font-weight:600;font-size:13.5px;text-decoration:none;white-space:nowrap}
  .maplink:hover{text-decoration:underline}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;margin-top:4px}
  .photo{display:block;border-radius:10px;overflow:hidden;border:1px solid var(--line);aspect-ratio:4/3;background:var(--line)}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}
  .photo:hover img{transform:scale(1.04)}
  @media (max-width:768px){ .photo-grid{grid-template-columns:1fr} }

  table{width:100%;border-collapse:collapse;font-size:15px}
  th{font-size:13px;color:var(--sub);font-weight:600;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line-strong);white-space:nowrap}
  td{padding:11px 10px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--body)}
  tr:last-child td{border-bottom:none}
  .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  @media (max-width:768px){
    th{padding:7px 7px}
    td{padding:10px 7px}
  }
  .total td{font-weight:700;color:var(--ink);border-top:1px solid var(--line-strong)}
  .note-cell{color:var(--sub);font-size:13.5px}

  .badge{display:inline-block;font-size:12.5px;font-weight:600;border-radius:5px;padding:2px 8px;white-space:nowrap}
  .badge.s0{color:var(--pend);background:var(--pend-bg)}
  .badge.s1{color:var(--mint-ink);background:var(--mint-bg)}
  .badge.s2{color:var(--ok);background:var(--ok-bg)}
  .badge.neg{color:var(--loss);background:var(--loss-bg)}
  .badge.pos{color:var(--ok);background:var(--ok-bg)}
  .badge.clickable{cursor:pointer;outline:1px solid currentColor;outline-offset:-1px}

  /* 개요 */
  .dday-line{display:flex;align-items:baseline;gap:14px;margin:18px 0 4px;flex-wrap:wrap}
  .dday-num{display:inline-block;font-size:34px;font-weight:800;color:var(--ink);background:var(--mint);padding:6px 18px;border-radius:12px;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;line-height:1.15}
  .dday-date{font-size:16px;font-weight:600;color:var(--ink)}
  dl.facts{display:grid;grid-template-columns:84px 1fr;row-gap:10px;column-gap:14px;font-size:15px}
  dl.facts dt{color:var(--sub);font-size:13.5px;padding-top:2px}
  dl.facts dd{color:var(--ink);font-weight:500}
  .summary-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:4px}
  .summary-chip{font-size:13.5px;color:var(--body);background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:7px 12px}
  .summary-chip b{color:var(--ink)}

  /* 타임라인 */
  .tl-item{display:flex;gap:16px;padding:13px 2px;border-bottom:1px solid var(--line)}
  .tl-item:last-child{border-bottom:none}
  .tl-time{flex:0 0 88px;font-weight:700;font-size:15px;color:var(--ink);font-variant-numeric:tabular-nums}
  .tl-item.main .tl-time{color:var(--mint-ink)}
  .tl-body{flex:1;min-width:0}
  .tl-body .t{font-weight:600;font-size:15.5px;color:var(--ink)}
  .tl-body .len{font-size:13px;color:var(--sub);font-weight:400;margin-left:7px}
  .tl-body .d{font-size:14px;color:var(--sub);margin-top:2px}

  /* 콘텐츠 */
  .ct-item{padding:14px 2px;border-bottom:1px solid var(--line);position:relative}
  .ct-item:last-child{border-bottom:none}
  .ct-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .ct-top .name{font-weight:700;font-size:16px;color:var(--ink)}
  .ct-meta{display:grid;grid-template-columns:48px 1fr;row-gap:3px;column-gap:10px;font-size:14px;margin-top:7px}
  .ct-meta .k{color:var(--sub);font-size:13px;padding-top:1px}

  /* 체크리스트 */
  .chk{display:flex;align-items:flex-start;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line)}
  .chk:last-child{border-bottom:none}
  .chk .box{
    flex:0 0 20px;height:20px;margin-top:3px;cursor:pointer;
    border:1.5px solid var(--line-strong);border-radius:5px;background:var(--surface);
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;
  }
  .chk.done .box{background:var(--ok);border-color:var(--ok)}
  .chk.done .txt{color:var(--sub);text-decoration:line-through}
  .chk .due{flex:0 0 80px;font-size:13px;font-weight:600;color:var(--mint-ink);padding-top:3px}
  .chk .txt{font-size:15px;flex:1;color:var(--body)}

  /* 준비 로드맵 — 세로 스케줄 타임라인 */
  .schedule{position:relative}
  .sch-row{display:flex;align-items:stretch;min-height:50px}
  .sch-date{flex:0 0 56px;text-align:right;padding:12px 12px 0 0;font-variant-numeric:tabular-nums}
  .sch-date-main{font-size:13.5px;font-weight:700;color:var(--mint-ink);white-space:nowrap}
  .sch-date-sub{font-size:11px;font-weight:700;color:var(--mint-ink);background:var(--mint-bg);border-radius:5px;padding:0 5px;display:inline-block;margin-top:3px;white-space:nowrap}
  .sch-row.done .sch-date-main{color:var(--sub);font-weight:600}
  .sch-row.done .sch-date-sub{color:var(--sub);background:var(--line)}
  .sch-rail{flex:0 0 24px;position:relative;display:flex;justify-content:center}
  .sch-rail:before{content:"";position:absolute;top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%);background:var(--line)}
  .sch-row:first-child .sch-rail:before{top:19px}
  .sch-row:last-child .sch-rail:before{bottom:auto;height:19px}
  .sch-dot{position:relative;z-index:1;margin-top:11px;width:16px;height:16px;border-radius:50%;border:2px solid var(--line-strong);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex:0 0 auto}
  .sch-row.done .sch-dot{background:var(--mint);border-color:var(--mint);color:var(--ink)}
  .sch-row.done .sch-rail:before{background:var(--mint)}
  .sch-body{flex:1;padding:11px 0 11px 12px;min-width:0}
  .sch-task{font-size:15px;color:var(--body);line-height:1.5}
  .sch-row.st2 .sch-task{color:var(--sub);text-decoration:line-through}
  .sch-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:5px}
  .sch-owner{font-size:12.5px;color:var(--sub)}
  /* 진행중 점: 민트 테두리 + 안쪽 점 / 지연·임박 날짜 색 */
  .sch-row.st1 .sch-dot{border-color:var(--mint);box-shadow:inset 0 0 0 3px var(--mint)}
  .sch-row.overdue .sch-date-main{color:var(--loss)}
  .sch-row.soon .sch-date-main{color:var(--pend)}
  .sch-edit{padding:10px 0;border-bottom:1px solid var(--line)}
  .sch-edit:last-of-type{border-bottom:none}
  .sch-edit .e-line{margin-bottom:6px}
  /* 자료 링크 */
  .res-row{display:flex;gap:14px;align-items:baseline;padding:11px 2px;border-bottom:1px solid var(--line);font-size:15px}
  .res-row:last-child{border-bottom:none}
  .res-label{flex:0 0 140px;font-weight:700;color:var(--ink)}
  .res-link{color:var(--mint-ink);font-weight:600;text-decoration:none;word-break:break-all}
  .res-link:hover{text-decoration:underline}
  .res-empty{color:var(--sub);font-size:13.5px}
  @media (max-width:768px){ .res-row{flex-direction:column;gap:2px} .res-label{flex:none} }
  /* 레퍼런스 갤러리 */
  .ref-filter{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px}
  .ref-fchip{font-size:13px;border:1px solid var(--line-strong);border-radius:999px;padding:5px 13px;cursor:pointer;color:var(--sub);background:var(--surface)}
  .ref-fchip:hover{border-color:var(--mint-ink);color:var(--mint-ink)}
  .ref-fchip.on{background:var(--mint-bg);border-color:var(--mint);color:var(--mint-ink);font-weight:700}
  .ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  .ref-card{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--surface);text-decoration:none;color:inherit;transition:border-color .15s,transform .15s}
  a.ref-card:hover{border-color:var(--mint);transform:translateY(-2px)}
  .ref-img{width:100%;aspect-ratio:16/10;object-fit:cover;display:block;background:var(--line)}
  .ref-body{padding:13px 14px;display:flex;flex-direction:column;gap:7px}
  .ref-title{font-size:15px;font-weight:700;color:var(--ink);line-height:1.4}
  .ref-tags{display:flex;flex-wrap:wrap;gap:5px}
  .ref-tag{font-size:11.5px;font-weight:600;color:var(--mint-ink);background:var(--mint-bg);border-radius:5px;padding:1px 7px}
  .ref-note{font-size:13.5px;color:var(--sub);line-height:1.5}
  .ref-edit{padding:12px 0;border-bottom:1px solid var(--line)}
  .ref-edit:last-of-type{border-bottom:none}
  .ref-edit .e-line{margin-bottom:6px}
  @media (max-width:768px){ .ref-grid{grid-template-columns:1fr 1fr;gap:10px} .ref-body{padding:10px} }

  /* 모집 */
  .bar{height:10px;background:#ecebe9;border-radius:5px;overflow:hidden;margin:16px 0 8px;position:relative}
  .bar .fill{height:100%;background:var(--mint);border-radius:5px;transition:width .3s}
  .bar .bep-mark{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink)}
  .recruit-nums{display:flex;justify-content:space-between;font-size:13.5px;color:var(--sub);flex-wrap:wrap;gap:4px}
  .recruit-big{font-size:34px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
  .recruit-big span{font-size:15px;font-weight:500;color:var(--sub)}
  .recruit-edit{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:16px}
  .recruit-edit label{font-size:13px;color:var(--sub);display:block;margin-bottom:4px}

  /* 결정 로그 */
  .dec{display:flex;gap:12px;padding:11px 2px;border-bottom:1px solid var(--line);align-items:flex-start}
  .dec:last-child{border-bottom:none}
  .dec .date{flex:0 0 48px;font-size:13px;color:var(--sub);padding-top:3px;font-variant-numeric:tabular-nums}
  .dec .txt{flex:1;font-size:15px}

  /* 플리마켓 */
  .rule-list{list-style:none}
  .rule-list li{display:flex;gap:10px;padding:10px 2px;border-bottom:1px solid var(--line);font-size:15px}
  .rule-list li:last-child{border-bottom:none}
  .rule-list li:before{content:"";flex:0 0 5px;height:5px;border-radius:50%;background:var(--line-strong);margin-top:11px}
  .rule-list li .v{flex:1}

  /* 댓글 */
  .cm-item{display:flex;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);align-items:flex-start}
  .cm-item:last-child{border-bottom:none}
  .cm-body{flex:1;min-width:0}
  .cm-head{font-size:13px;color:var(--sub)}
  .cm-head b{color:var(--ink);font-size:13.5px;font-weight:600}
  .cm-text{font-size:15px;color:var(--body);white-space:pre-wrap;word-break:break-word}
  .cm-empty{font-size:14px;color:var(--sub);padding:4px 2px}
  .cm-form{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap}
  .cm-form .name{flex:0 0 84px}
  .cm-form .text{flex:1;min-width:140px}
  .cm-form button{border:none;background:var(--ink);color:#fff;border-radius:7px;padding:0 16px;font-size:14px;cursor:pointer;height:35px}
  /* 모바일: 입력칸 16px(아이폰 자동확대 방지) + 등록 버튼 한 줄 전체 폭 */
  @media (max-width:768px){
    .cm-form .name{flex:0 0 78px}
    .cm-form .text{flex:1 1 0;min-width:0}
    .cm-form button{flex:0 0 100%;height:42px}
    .cm-form .e-in{font-size:16px}
    .cm-text{font-size:15.5px}
  }

  /* ===== 수정 모드 ===== */
  .e-in{
    font:inherit;font-size:14.5px;width:100%;
    border:1px solid var(--line-strong);border-radius:7px;
    padding:7px 10px;background:var(--surface);color:var(--ink);
  }
  .e-in:focus{outline:none;border-color:var(--mint-ink)}
  .e-in.sm{width:88px}
  .e-in.num{text-align:right}
  .e-row-tools{display:flex;gap:6px;flex:0 0 auto;align-items:center}
  .tool-btn{border:1px solid var(--line);background:var(--surface);border-radius:7px;width:30px;height:30px;font-size:13px;cursor:pointer;color:var(--sub)}
  .tool-btn:hover{border-color:var(--line-strong);color:var(--ink)}
  .tool-btn.del:hover{color:var(--loss);border-color:var(--loss)}
  .tool-btn:disabled{opacity:.35;cursor:default}
  .add-btn{
    display:block;width:100%;margin-top:14px;cursor:pointer;
    border:1px dashed var(--line-strong);background:none;border-radius:8px;
    padding:10px;font-size:14px;color:var(--sub);
  }
  .add-btn:hover{border-color:var(--mint-ink);color:var(--mint-ink)}
  .e-stack{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0}
  .e-line{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
  .e-label{font-size:12.5px;color:var(--sub);flex:0 0 auto}
  .main-toggle{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--sub);white-space:nowrap;cursor:pointer}
  .form-grid{display:grid;grid-template-columns:110px 1fr;row-gap:10px;column-gap:12px;align-items:center}
  .form-grid .e-label{text-align:left}

  /* ===== 하단 고정 버튼 ===== */
  #fab{position:fixed;right:20px;bottom:20px;display:flex;gap:8px;z-index:50}
  #fab button{
    border-radius:9px;padding:12px 22px;font-size:15px;font-weight:600;cursor:pointer;
    border:1px solid transparent;box-shadow:0 2px 10px rgba(31,29,26,.14);
  }
  #fab .edit-btn{background:var(--ink);color:#fff}
  #fab .save-btn{background:var(--mint);color:var(--ink);font-weight:700}
  #fab .cancel-btn{background:var(--surface);color:var(--body);border-color:var(--line-strong)}
  #edit-hint{
    position:fixed;left:50%;transform:translateX(-50%);bottom:74px;z-index:50;
    background:var(--ink);color:#fff;font-size:13px;border-radius:7px;padding:7px 16px;
    opacity:.93;white-space:nowrap;
  }
  @media (max-width:768px){
    #fab{right:14px;bottom:14px}
  }
</style>
</head>
<body>
<div id="topbar">
  <div class="tb-row">
    <span class="ttl">행사 운영 대시보드</span>
    <span class="conn" id="conn-m"><span class="dot"></span><span class="lbl">연결 중</span></span>
  </div>
  <div id="tabs"></div>
</div>
<div id="layout">

function persist(){
  if (db) db.ref(DB_PATH).set(state);
  else { localStorage.setItem(LOCAL_KEY, JSON.stringify(state)); }
}
function mergeState(saved){
  if (!saved) return JSON.parse(JSON.stringify(DEFAULT_STATE));
  const out = JSON.parse(JSON.stringify(DEFAULT_STATE));
  for (const k of Object.keys(saved)) out[k] = saved[k];
  return out;
}

function startEdit(){ draft = JSON.parse(JSON.stringify(state)); render(); }
function saveEdit(){ state = draft; draft = null; persist(); render(); }
function cancelEdit(){

  draft = null; render();
}

/* ====== 헬퍼 ====== */
function el(tag, cls, text){
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function won(n){ return (n||0).toLocaleString('ko-KR') + '원'; }
function inp(obj, key, opts={}){
  const i = document.createElement('input');
  i.className = 'e-in' + (opts.sm?' sm':'') + (opts.number?' num':'');
  i.value = obj[key] ?? '';
  if (opts.placeholder) i.placeholder = opts.placeholder;
  i.addEventListener('input', ()=>{
    let v = i.value;
    if (opts.number){ v = parseInt(String(v).replace(/[^0-9]/g,''),10) || 0; }
    obj[key] = v;
  });
  if (opts.number) i.addEventListener('blur', ()=>{ i.value = obj[key]; });
  return i;
}
function delBtn(arr, i, label){
  const b = el('button','tool-btn del','✕');
  b.title = '삭제';
  b.addEventListener('click', ()=>{
    if (confirm((label||'이 항목') + '을(를) 삭제할까요?')){ arr.splice(i,1); render(); }
  });
  return b;
}
function upBtn(arr, i){
  const b = el('button','tool-btn','↑');
  b.title = '위로';
  b.disabled = i===0;
  b.addEventListener('click', ()=>{
    if (i===0) return;
    [arr[i-1], arr[i]] = [arr[i], arr[i-1]];
    render();
  });
  return b;
}
function addBtn(text, fn){
  const b = el('button','add-btn', '+ ' + text);
  b.addEventListener('click', ()=>{ fn(); render(); });
  return b;
}
function pageHead(title, desc){
  const frag = document.createDocumentFragment();
  frag.appendChild(el('h1','',title));
  if (desc) frag.appendChild(el('p','page-desc',desc));
  else { const sp = el('div'); sp.style.height='20px'; frag.appendChild(sp); }
  return frag;
}
function ddayText(){
  const days = Math.ceil((new Date(cur().meta.date+'T00:00:00') - new Date(new Date().toDateString())) / 86400000);
  return isNaN(days) ? 'D-?' : (days > 0 ? 'D-'+days : (days === 0 ? 'D-DAY' : '종료'));
}
/* 로드맵 항목의 상태(0 할일/1 진행중/2 완료) — 옛 done 데이터 호환 */
function itemStatus(r){
  if (typeof r.status === 'number') return r.status;
  return r.done ? 2 : 0;
}
/* 마감 임박/지연 판정 (완료 항목은 제외). due 문자열에서 M/D 추출해 오늘과 비교 */
function urgency(r){
  if (itemStatus(r) === 2) return 'none';
  const m = String(r.due||'').match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return 'none';
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(today.getFullYear(), (+m[1])-1, +m[2]);
  const diff = Math.round((d - today) / 86400000);
  if (diff < 0) return 'overdue';
  if (diff <= 7) return 'soon';
  return 'none';
}

function renderChrome(){
  /* 사이드바 헤더 */
  document.getElementById('sb-title').textContent = cur().meta.title;
  const m = document.getElementById('sb-meta');
  m.textContent = '';
  const dd = el('span','dday', ddayText());
  m.appendChild(dd);
  m.appendChild(document.createTextNode(' · ' + cur().meta.dateLabel));

  /* 미결 수 */
  const openCount = cur().decisions.filter(d=>d.open).length;

  /* 사이드바 내비 (그룹별) */
  const nav = document.getElementById('nav');
  nav.textContent = '';
  NAV.forEach(group=>{
    if (group.title) nav.appendChild(el('div','nav-group-title', group.title));
    group.items.forEach(s=>{
      const b = el('button','nav-item' + (active===s.id?' active':''));
      b.appendChild(el('span','',s.label));
      if (s.id==='decisions' && openCount) b.appendChild(el('span','nav-badge', '미결 ' + openCount));
      b.addEventListener('click', ()=>go(s.id));
      nav.appendChild(b);
    });
  });

  /* 모바일 탭 */
  const tabs = document.getElementById('tabs');
  tabs.textContent = '';
  SECTIONS.forEach(s=>{
    const b = el('button','tab' + (active===s.id?' active':''), s.label);
    b.addEventListener('click', ()=>go(s.id));
    tabs.appendChild(b);
  });
  const at = tabs.querySelector('.tab.active');
  at?.scrollIntoView({block:'nearest', inline:'center'});

  /* 연결 상태 */
  for (const id of ['conn','conn-m']){
    const c = document.getElementById(id);
    c.className = 'conn' + (connected?' on':'');
    c.querySelector('.lbl').textContent = connected ? '공유 연결됨 — 저장하면 모두에게 반영' : '오프라인 (이 브라우저에만 저장)';
  }
  document.getElementById('conn-m').querySelector('.lbl').textContent = connected ? '공유 연결됨' : '오프라인';
}

function renderFab(){
  const fab = document.getElementById('fab');
  fab.textContent = '';
  document.getElementById('edit-hint')?.remove();
  if (editing()){
    const hint = el('div','', '수정 중 — 저장을 눌러야 모두에게 반영됩니다');
    hint.id = 'edit-hint';
    document.body.appendChild(hint);
    const cancel = el('button','cancel-btn','취소');
    cancel.addEventListener('click', cancelEdit);
    const save = el('button','save-btn','저장');
    save.addEventListener('click', saveEdit);
    fab.appendChild(cancel); fab.appendChild(save);
  } else {
    const edit = el('button','edit-btn','수정');
    edit.addEventListener('click', startEdit);
    fab.appendChild(edit);
  }
}

  if (allTags.length){
    const fb = el('div','ref-filter');
    const mkChip=(label,val)=>{ const c=el('span','ref-fchip'+(refFilter===val?' on':''),label); c.addEventListener('click',()=>{ refFilter=val; render(); }); return c; };
    fb.appendChild(mkChip('전체', null));
    allTags.forEach(t=> fb.appendChild(mkChip('#'+t, t)));
    box.appendChild(fb);
  }

  const shown = refFilter ? list.filter(it=>(it.tags||[]).includes(refFilter)) : list;
  const grid = el('div','ref-grid');

/* ====== 댓글 ====== */
function persistLocalComments(){
  localStorage.setItem(COMMENTS_LOCAL_KEY, JSON.stringify(comments));
}
function addComment(section){
  const text = (commentDrafts[section] || '').trim();
  if (!text) return;
  const entry = { name: (myName || '').trim() || '익명', text, ts: Date.now() };
  commentDrafts[section] = '';
  if (db){
    db.ref(COMMENTS_PATH + '/' + section).push(entry);   /* 동시 작성해도 안 겹침 */
  } else {
    if (!comments[section]) comments[section] = {};
    comments[section]['c' + Date.now()] = entry;
    persistLocalComments();
    render();
  }
}
function delComment(section, key, name){
  if (!confirm(name + '님의 댓글을 삭제할까요?')) return;
  if (db) db.ref(COMMENTS_PATH + '/' + section + '/' + key).remove();
  else persistLocalComments();
  if (comments[section]) delete comments[section][key];   /* 화면 즉시 반영 (수정 모드에선 리스너가 render 안 함) */
  render();
}
function fmtTs(ts){
  const d = new Date(ts);
  return (d.getMonth()+1) + '/' + d.getDate() + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function renderComments(section){
  const list = Object.entries(comments[section] || {})
    .map(([key,c])=>({key, ...c}))
    .sort((a,b)=>(a.ts||0)-(b.ts||0));

  const panel = el('div','panel');
  panel.appendChild(el('div','panel-title', '댓글' + (list.length ? ' ' + list.length : '')));

  if (!list.length){
    panel.appendChild(el('div','cm-empty', editing() ? '댓글 없음.' : '아직 댓글이 없어요. 이 화면에 대한 의견을 남겨보세요.'));
  }
  list.forEach(c=>{
    const row = el('div','cm-item');
    const body = el('div','cm-body');
    const head = el('div','cm-head');
    head.appendChild(el('b','', c.name || '익명'));
    head.appendChild(document.createTextNode(' · ' + fmtTs(c.ts)));
    body.appendChild(head);
    body.appendChild(el('div','cm-text', c.text));
    row.appendChild(body);
    if (editing()){   /* 삭제는 수정 모드에서만 — 평소엔 실수로 못 지움 */
      const del = el('button','tool-btn del','✕');
      del.title = '삭제';
      del.addEventListener('click', ()=> delComment(section, c.key, c.name || '익명'));
      row.appendChild(del);
    }
    panel.appendChild(row);
  });

  /* 수정 모드에선 작성 폼 대신 안내만, 평소엔 작성 폼 */
  if (editing()){
    if (list.length) panel.appendChild(el('div','cm-empty','✕ 로 댓글 삭제 가능 (수정 모드에서만)'));
    return panel;
  }

  const form = el('div','cm-form');
  const nameIn = document.createElement('input');
  nameIn.className = 'e-in name';
  nameIn.placeholder = '이름';
  nameIn.value = myName;
  nameIn.addEventListener('input', ()=>{
    myName = nameIn.value;
    localStorage.setItem('bc-comment-name', myName);
  });
  const textIn = document.createElement('input');
  textIn.className = 'e-in text';
  textIn.placeholder = '댓글 입력 후 Enter';
  textIn.value = commentDrafts[section] || '';
  textIn.addEventListener('input', ()=>{ commentDrafts[section] = textIn.value; });
  textIn.addEventListener('keydown', e=>{ if (e.key === 'Enter') addComment(section); });
  const btn = el('button','','등록');
  btn.addEventListener('click', ()=> addComment(section));
  form.appendChild(nameIn); form.appendChild(textIn); form.appendChild(btn);
  panel.appendChild(form);
  return panel;
}

/* ====== 시작 ====== */
function startLocal(){
  const saved = localStorage.getItem(LOCAL_KEY);
  if (saved){
    try { state = mergeState(JSON.parse(saved)); } catch(e){ /* 손상 시 기본값 */ }
  }
  try { comments = JSON.parse(localStorage.getItem(COMMENTS_LOCAL_KEY) || '{}'); } catch(e){ comments = {}; }
  connected = false;
  render();
}

function startShared(){
  /* CDN 폴백: jsdelivr 먼저(폰에서 폰트도 여기서 잘 받아짐), 막히면 gstatic 재시도 */
  const CDNS = [
    { app:'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.js',
      db: 'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-database-compat.js' },
    { app:'https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js',
      db: 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js' }
  ];
  let started = false;
  function loadScript(src, ok, err){
    const sc = document.createElement('script');
    sc.src = src; sc.onload = ok; sc.onerror = err;
    document.head.appendChild(sc);
  }
  function init(){
    if (started) return; started = true;
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    db.ref(DB_PATH).on('value', snap=>{
      const val = snap.val();
      if (val) state = mergeState(val);
      else db.ref(DB_PATH).set(state);
      connected = true;
      if (!editing()) render();   /* 수정 모드 중엔 화면 안 덮어씀 */
      else renderChrome();
    });
    db.ref(COMMENTS_PATH).on('value', snap=>{
      comments = snap.val() || {};
      if (!editing()) render();
    });
  }
  function tryCDN(i){
    if (i >= CDNS.length){ startLocal(); return; }   /* 전부 실패 → 오프라인(로컬) */
    loadScript(CDNS[i].app,
      ()=> loadScript(CDNS[i].db, init, ()=>tryCDN(i+1)),
      ()=> tryCDN(i+1));
  }
  tryCDN(0);
}

render();
if (firebaseConfig) startShared();
else startLocal();
